<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QIE SafeSign</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 340px;
        padding: 16px;
        background: #f4f8fb;
        color: #0f172a;
        font-size: 13px;
        line-height: 1.5;
      }
      h1 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .subtitle {
        color: #64748b;
        margin-bottom: 12px;
        font-size: 12px;
      }
      .status-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .status-badge.safe {
        background: #dcfce7;
        color: #166534;
      }
      .status-badge.warn {
        background: #fee2e2;
        color: #991b1b;
      }
      .risk-box {
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        background: #fee2e2;
        color: #991b1b;
        font-size: 12px;
        display: none;
        border: 1px solid #fecaca;
      }
      .details {
        margin-bottom: 14px;
        font-size: 12px;
        color: #334155;
      }
      .details p {
        margin-bottom: 4px;
      }
      .details code {
        display: inline-block;
        background: #e2e8f0;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 11px;
        margin: 2px 2px 0 0;
      }
      .hex-list {
        margin-top: 4px;
      }
      .muted {
        color: #94a3b8;
        font-style: italic;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn-primary {
        background: #0f172a;
        color: #fff;
        margin-bottom: 8px;
      }
      .btn-primary:hover {
        background: #1e293b;
      }
      .btn-secondary {
        background: #fff;
        color: #0f172a;
        border: 1px solid #cbd5e1;
      }
      .btn-secondary:hover {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <h1>QIE SafeSign</h1>
    <p class="subtitle">Transaction safety layer for QIE</p>

    <div id="status" class="status-badge safe">Scanning...</div>

    <div id="risk" class="risk-box">
      ⚠ Suspicious approval pattern detected on this page.
    </div>

    <div id="details" class="details">
      <p class="muted">Loading page data...</p>
    </div>

    <a id="scannerLink" href="#" class="btn btn-primary" target="_blank">
      Open in SafeSign Scanner
    </a>
    <button id="openScanner" class="btn btn-secondary">
      New Scan
    </button>

    <script src="dist/popup.js"></script>
  </body>
</html>
